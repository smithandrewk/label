services:
  db:
    image: mysql:latest
    container_name: my_db_container
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: delta
      MYSQL_USER: andrew
      MYSQL_PASSWORD: admin
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - my_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
  app:
    build: .
    container_name: my_app_container
    environment:
      MYSQL_HOST: db
      MYSQL_USER: andrew
      MYSQL_PASSWORD: admin
      MYSQL_DATABASE: delta
      DATA_DIR: ~/.delta/data
      FLASK_ENV: development
      FLASK_DEBUG: true
    ports:
      - "3000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - my_network
volumes:
  db_data:

networks:
  my_network:
    driver: bridge